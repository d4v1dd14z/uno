<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UNO Master — Multijugador</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #1f2630;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --red: #e53935;
    --yellow: #fdd835;
    --green: #43a047;
    --blue: #1e88e5;
    --accent: #ffb300;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: radial-gradient(ellipse at top, #1a2332 0%, #0d1117 60%); color: var(--text); min-height: 100vh; }
  h1, h2, h3 { margin: 0 0 .5rem; }
  button { font-family: inherit; cursor: pointer; border: none; border-radius: 8px; padding: .6rem 1.2rem; font-weight: 600; transition: transform .1s, box-shadow .1s; }
  button:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.4); }
  button:disabled { opacity: .4; cursor: not-allowed; }
  /* Lobby */
  .screen { display: none; padding: 2rem; max-width: 1200px; margin: 0 auto; }
  .screen.active { display: block; }
  .lobby-card { max-width: 460px; margin: 4rem auto; background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 2.5rem; text-align: center; box-shadow: 0 12px 48px rgba(0,0,0,.5); }
  .lobby-card h1 { font-size: 2.5rem; background: linear-gradient(135deg, var(--red), var(--yellow), var(--green), var(--blue)); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: 4px; }
  .lobby-card input { width: 100%; padding: .8rem 1rem; font-size: 1rem; background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); margin: 1rem 0; }
  .lobby-card input:focus { outline: 2px solid var(--accent); }
  .btn-primary { background: linear-gradient(135deg, var(--blue), #6a4cff); color: white; width: 100%; padding: .9rem; font-size: 1rem; }
  .status { margin-top: 1rem; color: var(--muted); font-size: .9rem; }
  .waiting-list { list-style: none; padding: 0; margin: 1.5rem 0; }
  .waiting-list li { background: var(--panel-2); padding: .6rem; border-radius: 6px; margin: .3rem 0; }
  /* Game */
  .game-grid { display: grid; grid-template-rows: auto 1fr auto; gap: 1rem; min-height: 100vh; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--panel); padding: .8rem 1.2rem; border-radius: 12px; border: 1px solid var(--border); flex-wrap: wrap; gap: .8rem; }
  .turn-info { display: flex; gap: 1.2rem; align-items: center; flex-wrap: wrap; }
  .turn-badge { padding: .3rem .8rem; border-radius: 6px; font-weight: 700; background: var(--panel-2); }
  .turn-badge.mine { background: var(--accent); color: #1a1a1a; animation: pulse 1.5s infinite; }
  @keyframes pulse { 50% { box-shadow: 0 0 20px var(--accent); } }
  .direction { font-size: 1.4rem; }
  .board { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; padding: 2rem; background: var(--panel); border-radius: 16px; border: 1px solid var(--border); }
  .top-card-wrap { display: flex; flex-direction: column; align-items: center; gap: .6rem; }
  .top-card-wrap small { color: var(--muted); }
  .card { width: 90px; height: 135px; border-radius: 10px; background: #222; box-shadow: 0 4px 12px rgba(0,0,0,.5); transition: transform .15s; display: flex; align-items: center; justify-content: center; }
  .card img { width: 100%; height: 100%; border-radius: 10px; display: block; }
  .hand-actions { display: flex; gap: .8rem; flex-wrap: wrap; justify-content: center; }
  .btn-draw { background: var(--green); color: white; }
  .btn-uno { background: var(--red); color: white; }
  .btn-corte { background: var(--accent); color: #1a1a1a; }
  .hand-wrap { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; }
  .hand-wrap h3 { color: var(--muted); font-size: .85rem; text-transform: uppercase; letter-spacing: 1px; }
  .hand { display: flex; gap: .4rem; overflow-x: auto; padding: .8rem 0; min-height: 150px; }
  .hand .card { flex-shrink: 0; cursor: pointer; }
  .hand .card.playable:hover { transform: translateY(-12px); box-shadow: 0 8px 24px var(--accent); }
  .hand .card.disabled { opacity: .55; cursor: not-allowed; filter: grayscale(.4); }
  .log { background: var(--panel-2); border-radius: 8px; padding: .6rem 1rem; margin-top: .6rem; color: var(--muted); font-size: .9rem; min-height: 1.5em; }
  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.75); display: none; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--panel); border: 2px solid var(--accent); border-radius: 16px; padding: 2rem; max-width: 480px; text-align: center; box-shadow: 0 16px 64px rgba(0,0,0,.6); }
  .modal h2 { color: var(--accent); }
  .modal-actions { margin-top: 1.5rem; display: flex; gap: .6rem; justify-content: center; flex-wrap: wrap; }
  .color-btn { width: 60px; height: 60px; border-radius: 50%; border: 3px solid white; }
  .color-btn[data-color="Rojo"]    { background: var(--red); }
  .color-btn[data-color="Amarillo"]{ background: var(--yellow); }
  .color-btn[data-color="Verde"]   { background: var(--green); }
  .color-btn[data-color="Azul"]    { background: var(--blue); }
  /* Settings panel */
  .server-row { display: flex; gap: .5rem; margin-top: 1rem; }
  .server-row input { flex: 1; padding: .5rem; background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: .85rem; }
</style>
</head>
<body>
<!-- ============ LOBBY ============ -->
<section id="screen-lobby" class="screen active">
  <div class="lobby-card">
    <h1>UNO</h1>
    <p style="color:var(--muted);margin-top:0">Multijugador en tiempo real</p>
    <input id="input-name" type="text" placeholder="Tu nickname" maxlength="20" autocomplete="off" />
    <button id="btn-join" class="btn-primary">Entrar al Lobby</button>
    <div class="server-row">
      <input id="input-server" type="text" placeholder="wss://tu-servidor.onrender.com" />
      <button id="btn-save-server" style="background:var(--panel-2);color:var(--text);">Guardar</button>
    </div>
    <div class="status" id="lobby-status">Conéctate para jugar (4 jugadores requeridos)</div>
    <ul id="waiting-list" class="waiting-list"></ul>
  </div>
</section>
<!-- ============ GAME ============ -->
<section id="screen-game" class="screen">
  <div class="game-grid">
    <div class="top-bar">
      <div class="turn-info">
        <span>Jugador: <strong id="my-name"></strong></span>
        <span class="turn-badge" id="turn-badge">Turno: —</span>
        <span class="direction" id="direction">➡️</span>
      </div>
      <div class="turn-info">
        <span id="uno-status" style="color:var(--accent);font-weight:700;display:none">¡Dijiste UNO!</span>
      </div>
    </div>
    <div class="board">
      <div class="top-card-wrap">
        <small>Carta en mesa</small>
        <div class="card" id="top-card"></div>
      </div>
      <div class="hand-actions">
        <button class="btn-draw" id="btn-draw">Robar carta</button>
        <button class="btn-uno" id="btn-uno" style="display:none">¡UNO!</button>
        <button class="btn-corte" id="btn-corte" style="display:none">¡CORTE!</button>
      </div>
      <div class="log" id="log">Esperando...</div>
    </div>
    <div class="hand-wrap">
      <h3>Tu mano (<span id="hand-count">0</span>)</h3>
      <div class="hand" id="hand"></div>
    </div>
  </div>
</section>
<!-- ============ MODAL ============ -->
<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal">
    <h2 id="modal-title">Aviso</h2>
    <p id="modal-text"></p>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>
<script>
/* ====================== CONFIG ====================== */
const DEFAULT_SERVER = (location.protocol === 'https:')
  ? 'wss://unoserver-3.onrender.com'
  : 'wss://unoserver-3.onrender.com';
let SERVER_URL = localStorage.getItem('uno_server') || DEFAULT_SERVER;
/* ====================== STATE ====================== */
let ws = null;
let myName = '';
let currentHand = [];
let topCard = null;
let isMyTurn = false;
let pendingComodinIndex = null;
/* ====================== HELPERS ====================== */
const $ = (id) => document.getElementById(id);
const colorMap = { Rojo: 'Red', Amarillo: 'Yellow', Verde: 'Green', Azul: 'Blue', 'Comodín': 'Wild' };
const valueMap = {
  '0':'Zero','1':'One','2':'Two','3':'Three','4':'Four','5':'Five',
  '6':'Six','7':'Seven','8':'Eight','9':'Nine',
  'Bloqueo':'SkipTurn','CambioSentido':'Reverse','+2':'DrawTwo',
  '+4':'DrawFour','CambiaColor':'ChangeColor'
};
function cardImage(card) {
  if (!card) return '';
  if (card.value === '+4' || card.value === 'CambiaColor' || card.isComodinReal && (card.value === '+4' || card.value === 'CambiaColor')) {
    // Comodín jugado conserva isComodinReal + color elegido, pero la imagen original es Wild
    if (card.value === '+4') return 'assets/Wild_DrawFour.png';
    if (card.value === 'CambiaColor') return 'assets/Wild_ChangeColor.png';
  }
  const c = colorMap[card.color] || 'Wild';
  const v = valueMap[card.value] || card.value;
  return `assets/${c}_${v}.png`;
}
function renderCard(card) {
  if (!card) return '';
  return `<img src="${cardImage(card)}" alt="${card.color} ${card.value}" onerror="this.style.display='none'"/>`;
}
function isPlayable(card, top) {
  if (!card || !top) return false;
  if (card.color === 'Comodín') return true;
  return card.color === top.color || card.value === top.value;
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}
/* ====================== WS CONNECTION ====================== */
function connect() {
  $('lobby-status').textContent = `Conectando a ${SERVER_URL}...`;
  try { ws = new WebSocket(SERVER_URL); }
  catch (e) { $('lobby-status').textContent = 'URL inválida'; return; }
  ws.onopen = () => {
    $('lobby-status').textContent = 'Conectado. Enviando nickname...';
    ws.send(JSON.stringify({ type: 'joinGame', data: myName }));
  };
  ws.onmessage = (ev) => {
    const { type, data } = JSON.parse(ev.data);
    handleMessage(type, data);
  };
  ws.onclose = () => {
    $('lobby-status').textContent = 'Desconectado del servidor.';
  };
  ws.onerror = () => {
    $('lobby-status').textContent = 'Error de conexión. Verifica la URL del servidor.';
  };
}
/* ====================== EVENTS FROM SERVER ====================== */
function handleMessage(type, data) {
  switch (type) {
    case 'waitingRoom': {
      const ul = $('waiting-list');
      ul.innerHTML = data.map(n => `<li>👤 ${n}</li>`).join('');
      $('lobby-status').textContent = `En sala: ${data.length}/4. Esperando jugadores...`;
      break;
    }
    case 'gameState': {
      showScreen('screen-game');
      currentHand = data.hand;
      topCard = data.topCard;
      isMyTurn = data.isMyTurn;
      $('my-name').textContent = myName;
      $('hand-count').textContent = currentHand.length;
      $('direction').textContent = data.direction.includes('Derecha') ? '➡️' : '⬅️';
      const tb = $('turn-badge');
      tb.textContent = `Turno: ${data.currentTurnName}`;
      tb.classList.toggle('mine', isMyTurn);
      $('log').textContent = data.log || '';
      $('top-card').innerHTML = renderCard(topCard);
      $('btn-draw').disabled = !isMyTurn || data.isPaused;
      $('uno-status').style.display = data.dijoUno ? 'inline' : 'none';
      // Mostrar botón UNO si tengo exactamente 1 carta y no he cantado
      $('btn-uno').style.display = (currentHand.length === 1 && !data.dijoUno && data.mostrarBotoneraUno) ? 'inline-block' : 'none';
      // Mostrar CORTE si alguien tiene 1 carta y no soy yo en la condición de protegido
      $('btn-corte').style.display = data.mostrarBotoneraUno ? 'inline-block' : 'none';
      renderHand();
      break;
    }
    case 'showPopup':
      openModal('¡Atención!', data, [{ label: 'Aceptar', action: () => { ws.send(JSON.stringify({ type: 'resolvePopup' })); closeModal(); } }]);
      break;
    case 'errorMsg':
      openModal('Error', data, [{ label: 'OK', action: closeModal }]);
      break;
    case 'gameOver':
      openModal('Fin del Juego', data, [{ label: 'Volver al Lobby', action: () => { closeModal(); location.reload(); } }]);
      break;
  }
}
/* ====================== HAND RENDER ====================== */
function renderHand() {
  const hand = $('hand');
  hand.innerHTML = '';
  currentHand.forEach((card, idx) => {
    const div = document.createElement('div');
    div.className = 'card';
    const playable = isMyTurn && isPlayable(card, topCard);
    div.classList.add(playable ? 'playable' : 'disabled');
    div.innerHTML = renderCard(card);
    div.onclick = () => playable && onPlayCard(idx, card);
    hand.appendChild(div);
  });
}
/* ====================== ACTIONS ====================== */
function onPlayCard(idx, card) {
  if (card.color === 'Comodín') {
    pendingComodinIndex = idx;
    openModal('Elige un color', '', ['Rojo', 'Amarillo', 'Verde', 'Azul'].map(c => ({
      el: `<button class="color-btn" data-color="${c}" title="${c}"></button>`,
      action: () => sendPlay(idx, c),
    })));
  } else {
    sendPlay(idx, null);
  }
}
function sendPlay(index, chosenColor) {
  ws.send(JSON.stringify({ type: 'playCard', data: { index, chosenColor } }));
  closeModal();
}
/* ====================== MODAL ====================== */
function openModal(title, text, actions) {
  $('modal-title').textContent = title;
  $('modal-text').textContent = text;
  const wrap = $('modal-actions');
  wrap.innerHTML = '';
  actions.forEach(a => {
    if (a.el) {
      wrap.insertAdjacentHTML('beforeend', a.el);
      wrap.lastElementChild.onclick = a.action;
    } else {
      const b = document.createElement('button');
      b.className = 'btn-primary';
      b.style.width = 'auto';
      b.textContent = a.label;
      b.onclick = a.action;
      wrap.appendChild(b);
    }
  });
  $('modal-bg').classList.add('open');
}
function closeModal() { $('modal-bg').classList.remove('open'); }
/* ====================== UI BINDINGS ====================== */
$('input-server').value = SERVER_URL;
$('btn-save-server').onclick = () => {
  SERVER_URL = $('input-server').value.trim();
  localStorage.setItem('uno_server', SERVER_URL);
  $('lobby-status').textContent = 'Servidor guardado: ' + SERVER_URL;
};
$('btn-join').onclick = () => {
  const name = $('input-name').value.trim();
  if (!name) return alert('Ingresa un nickname');
  myName = name;
  $('btn-join').disabled = true;
  connect();
};
$('input-name').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('btn-join').click(); });
$('btn-draw').onclick = () => ws && ws.send(JSON.stringify({ type: 'drawCard' }));
$('btn-uno').onclick = () => ws && ws.send(JSON.stringify({ type: 'cantarUno' }));
$('btn-corte').onclick = () => ws && ws.send(JSON.stringify({ type: 'cantarCorte' }));
</script>
</body>
</html>
